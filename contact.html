<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- АДАПТИВ -->
    <meta name="viewport" content="width=320, initial-scale=1.0">

    <title>Contact us</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
</head>

<body class="tomato-page-body">

<!-- HEADER С БУРГЕРОМ -->
<header class="site-header">
    <div class="site-header-inner">

        <div class="logo-block">
            <img src="header.png" alt="logo" class="site-logo">
        </div>

        <div class="menu-block">
            <div class="search-line">
                <input type="text" placeholder="Search">
            </div>

            <!-- БУРГЕР -->
            <input type="checkbox" id="menu-toggle" class="menu-toggle">
            <label for="menu-toggle" class="burger">☰</label>

            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="#">Company Profile</a>
                <a href="tomato-all.html">Products</a>
                <a href="#">Services</a>
                <a href="#">R &amp; D</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>

    </div>
</header>

<div class="contact-page-wrapper">
    <section class="contact-section">
        <div class="contact-inner">
            <h1 class="contact-title">Contact us</h1>
            <div class="mini-line"></div>

            <div class="contact-grid">
                <div class="contact-left">
                    <h3>Company information</h3>
                    <p><strong>Agridera Seeds &amp; Agriculture Ltd.</strong></p>
                    <p>Phone: +380 00 000 00 00</p>
                    <p>Email: info@agridera.com</p>
                    <p>Address: Kyiv, Ukraine</p>

                    <h3>Working hours</h3>
                    <p>Monday – Friday: 09:00 – 18:00</p>
                    <p>Saturday – Sunday: Closed</p>
                </div>

                <div class="contact-right">
                    <form class="contact-form">
                        <input type="text" placeholder="Your name" required>
                        <input type="email" placeholder="Your email" required>
                        <input type="text" placeholder="Subject">
                        <textarea placeholder="Your message" rows="6" required></textarea>
                        <button type="submit">Send</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</div>

<footer class="footer text-center">
    <p>© 2026 Agridera</p>
</footer>

</body>
</html>
